<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-rate</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand-line">
                <div class="brand-title">E-rate</div>
                <div class="search-box">
                    <input id="search" type="search" placeholder="Search" aria-label="Search">
                </div>
            </div>
            <button class="icon-action" aria-label="Profile circle"></button>
        </header>

        <nav class="nav-tabs" role="tablist" aria-label="Main navigation">
            <button class="tab active" type="button" data-tab="Browse">Browse</button>
            <button class="tab" type="button" data-tab="Favorite">Favorite</button>
            <button class="tab" type="button" data-tab="Profile">Profile</button>
        </nav>

        <div class="divider"></div>

        <section class="section-head">
            <h2>Recently</h2>
            <span id="result-count" class="result-count">10</span>
        </section>

        <main id="content-area" class="content-area"></main>
    </div>

    <script src="script.js"></script>
</body>
</html>
